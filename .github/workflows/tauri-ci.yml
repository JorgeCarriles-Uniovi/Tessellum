name: Tauri CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Build (windows-latest / x86_64-pc-windows-msvc)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: windows-latest-x86_64-pc-windows-msvc-rust
          workspaces: src-tauri -> target

      - name: Install Windows bundling dependencies
        shell: pwsh
        run: |
          choco install wixtoolset nsis -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles msi,nsis
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-windows-latest-x86_64-pc-windows-msvc
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*
          if-no-files-found: error

  build-linux:
    name: Build (ubuntu-24.04 / x86_64-unknown-linux-gnu)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-24.04-x86_64-unknown-linux-gnu-rust
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \ 
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu --bundles deb,appimage
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-ubuntu-24.04-x86_64-unknown-linux-gnu
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*
          if-no-files-found: error

  build-macos-arm64:
    name: Build (macos-14 / aarch64-apple-darwin)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: macos-14-aarch64-apple-darwin-rust
          workspaces: src-tauri -> target

      - name: Purge kuzu native build artifacts
        run: |
          rm -rf src-tauri/target/release/build/kuzu-*
          rm -rf src-tauri/target/aarch64-apple-darwin/release/build/kuzu-*

      - name: Install macOS system dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config libomp

      - name: Print macOS build diagnostics
        run: |
          uname -a && uname -m
          clang --version
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          brew --prefix libomp
          rustc -Vv && cargo -V

      - name: Configure macOS build environment
        run: |
          MIN_MACOS="11.0"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "SDKROOT=$SDK_PATH"                                                                         >> "$GITHUB_ENV"
          echo "CMAKE_OSX_SYSROOT=$SDK_PATH"                                                              >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=$MIN_MACOS"                                                      >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=$MIN_MACOS"                                                   >> "$GITHUB_ENV"
          echo "CMAKE_OSX_ARCHITECTURES=arm64"                                                            >> "$GITHUB_ENV"
          echo "ARCHFLAGS=-arch arm64"                                                                    >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=1"                                                                       >> "$GITHUB_ENV"
          echo "NUM_JOBS=1"                                                                               >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1"                                                             >> "$GITHUB_ENV"
          echo "CMAKE_GENERATOR=Ninja"                                                                    >> "$GITHUB_ENV"
          echo "CMAKE_ARGS=-DCMAKE_OSX_SYSROOT=$SDK_PATH -DCMAKE_OSX_DEPLOYMENT_TARGET=$MIN_MACOS"       >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$LIBOMP_PREFIX"                                                        >> "$GITHUB_ENV"
          echo "CMAKE_INCLUDE_PATH=$LIBOMP_PREFIX/include"                                               >> "$GITHUB_ENV"
          echo "CMAKE_LIBRARY_PATH=$LIBOMP_PREFIX/lib"                                                   >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$LIBOMP_PREFIX/lib/pkgconfig"                                            >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$LIBOMP_PREFIX/include"                                                       >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$LIBOMP_PREFIX/lib -Wl,-rpath,$LIBOMP_PREFIX/lib"                             >> "$GITHUB_ENV"
          echo "CFLAGS=-mmacosx-version-min=$MIN_MACOS"                                                  >> "$GITHUB_ENV"
          echo "CXXFLAGS=-mmacosx-version-min=$MIN_MACOS -D_LIBCPP_DISABLE_AVAILABILITY"                 >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=clang"                                          >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_RUSTFLAGS=-C link-arg=-mmacosx-version-min=$MIN_MACOS" >> "$GITHUB_ENV"
          echo "CC_aarch64_apple_darwin=clang"                                                           >> "$GITHUB_ENV"
          echo "CXX_aarch64_apple_darwin=clang++"                                                        >> "$GITHUB_ENV"
          echo "AR_aarch64_apple_darwin=ar"                                                              >> "$GITHUB_ENV"
          echo "RANLIB_aarch64_apple_darwin=ranlib"                                                      >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Clean cached kuzu artifacts
        run: cargo clean -p kuzu --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri bundles
        run: npm run tauri build -- --target aarch64-apple-darwin --bundles app
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: "true"

      - name: Upload arm64 .app binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-binary
          # Upload only the inner binary, not the whole .app, for lipo
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app/Contents/MacOS/*
          if-no-files-found: error

  build-macos-x86_64:
    name: Build (macos-13 / x86_64-apple-darwin)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: macos-13-x86_64-apple-darwin-rust
          workspaces: src-tauri -> target

      - name: Purge kuzu native build artifacts
        run: |
          rm -rf src-tauri/target/release/build/kuzu-*
          rm -rf src-tauri/target/x86_64-apple-darwin/release/build/kuzu-*

      - name: Install macOS system dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config libomp

      - name: Print macOS build diagnostics
        run: |
          uname -a && uname -m
          clang --version
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          brew --prefix libomp
          rustc -Vv && cargo -V

      - name: Configure macOS build environment
        run: |
          MIN_MACOS="11.0"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "SDKROOT=$SDK_PATH"                                                                        >> "$GITHUB_ENV"
          echo "CMAKE_OSX_SYSROOT=$SDK_PATH"                                                             >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=$MIN_MACOS"                                                     >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=$MIN_MACOS"                                                  >> "$GITHUB_ENV"
          echo "CMAKE_OSX_ARCHITECTURES=x86_64"                                                          >> "$GITHUB_ENV"
          echo "ARCHFLAGS=-arch x86_64"                                                                  >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=1"                                                                      >> "$GITHUB_ENV"
          echo "NUM_JOBS=1"                                                                              >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1"                                                            >> "$GITHUB_ENV"
          echo "CMAKE_GENERATOR=Ninja"                                                                   >> "$GITHUB_ENV"
          echo "CMAKE_ARGS=-DCMAKE_OSX_SYSROOT=$SDK_PATH -DCMAKE_OSX_DEPLOYMENT_TARGET=$MIN_MACOS"      >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$LIBOMP_PREFIX"                                                       >> "$GITHUB_ENV"
          echo "CMAKE_INCLUDE_PATH=$LIBOMP_PREFIX/include"                                              >> "$GITHUB_ENV"
          echo "CMAKE_LIBRARY_PATH=$LIBOMP_PREFIX/lib"                                                  >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$LIBOMP_PREFIX/lib/pkgconfig"                                           >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$LIBOMP_PREFIX/include"                                                      >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$LIBOMP_PREFIX/lib -Wl,-rpath,$LIBOMP_PREFIX/lib"                            >> "$GITHUB_ENV"
          echo "CFLAGS=-mmacosx-version-min=$MIN_MACOS"                                                 >> "$GITHUB_ENV"
          echo "CXXFLAGS=-mmacosx-version-min=$MIN_MACOS -D_LIBCPP_DISABLE_AVAILABILITY"                >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang"                                          >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_RUSTFLAGS=-C link-arg=-mmacosx-version-min=$MIN_MACOS" >> "$GITHUB_ENV"
          echo "CC_x86_64_apple_darwin=clang"                                                           >> "$GITHUB_ENV"
          echo "CXX_x86_64_apple_darwin=clang++"                                                        >> "$GITHUB_ENV"
          echo "AR_x86_64_apple_darwin=ar"                                                              >> "$GITHUB_ENV"
          echo "RANLIB_x86_64_apple_darwin=ranlib"                                                      >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Clean cached kuzu artifacts
        run: cargo clean -p kuzu --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri bundles
        run: npm run tauri build -- --target x86_64-apple-darwin --bundles app
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: "true"

      - name: Upload x86_64 .app
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-app
          # Upload the full .app so the universal job can use it as the base
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/
          if-no-files-found: error

  build-macos-universal:
    name: Build (macOS universal binary)
    runs-on: macos-14
    needs: [build-macos-arm64, build-macos-x86_64]
    steps:
      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-binary
          path: arm64-binary/

      - name: Download x86_64 .app
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64-app
          path: x86_64-app/

      - name: Find app name
        id: appname
        run: |
          APP=$(ls x86_64-app/*.app | head -n1 | xargs basename)
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "name=${APP%.app}" >> "$GITHUB_OUTPUT"

      - name: Stitch universal binary with lipo
        run: |
          APP="${{ steps.appname.outputs.app }}"
          NAME="${{ steps.appname.outputs.name }}"
          BINARY_PATH="x86_64-app/$APP/Contents/MacOS/$NAME"
          ARM_BINARY=$(ls arm64-binary/* | head -n1)

          lipo -create -output "$BINARY_PATH" \
            "$ARM_BINARY" \
            "$BINARY_PATH"

          lipo -info "$BINARY_PATH"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package universal .dmg
        run: |
          APP="${{ steps.appname.outputs.app }}"
          NAME="${{ steps.appname.outputs.name }}"

          create-dmg \
            --volname "$NAME" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 200 \
            --icon "$APP" 150 200 \
            "${NAME}-universal.dmg" \
            "x86_64-app/$APP"

      - name: Upload universal .dmg
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-macos-universal
          path: "*-universal.dmg"
          if-no-files-found: error