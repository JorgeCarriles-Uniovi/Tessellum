name: Tauri CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-${{ matrix.target }}-${{ runner.arch }}-rust
          workspaces: |
            src-tauri -> target

      - name: Purge kuzu native build artifacts on macOS
        if: startsWith(matrix.os, 'macos-')
        run: |
          rm -rf src-tauri/target/release/build/kuzu-*
          rm -rf src-tauri/target/${{ matrix.target }}/release/build/kuzu-*

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows bundling dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset nsis -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install macOS system dependencies
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install cmake ninja pkg-config libomp

      - name: Print macOS build diagnostics
        if: startsWith(matrix.os, 'macos-')
        run: |
          uname -a
          uname -m
          clang --version
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          brew --prefix libomp
          rustc -Vv
          cargo -V

      - name: Configure macOS build environment
        if: startsWith(matrix.os, 'macos-')
        run: |
          MIN_MACOS="11.0"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "SDKROOT=$SDK_PATH" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_SYSROOT=$SDK_PATH" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=$MIN_MACOS" >> "$GITHUB_ENV"
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=$MIN_MACOS" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=1" >> "$GITHUB_ENV"
          echo "NUM_JOBS=1" >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> "$GITHUB_ENV"
          echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"
          echo "CMAKE_ARGS=-DCMAKE_OSX_SYSROOT=$SDK_PATH -DCMAKE_OSX_DEPLOYMENT_TARGET=$MIN_MACOS" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$LIBOMP_PREFIX:${CMAKE_PREFIX_PATH:-}" >> "$GITHUB_ENV"
          echo "CMAKE_INCLUDE_PATH=$LIBOMP_PREFIX/include:${CMAKE_INCLUDE_PATH:-}" >> "$GITHUB_ENV"
          echo "CMAKE_LIBRARY_PATH=$LIBOMP_PREFIX/lib:${CMAKE_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$LIBOMP_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$LIBOMP_PREFIX/include ${CPPFLAGS:-}" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$LIBOMP_PREFIX/lib -Wl,-rpath,$LIBOMP_PREFIX/lib ${LDFLAGS:-}" >> "$GITHUB_ENV"
          echo "CFLAGS=-mmacosx-version-min=$MIN_MACOS" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-mmacosx-version-min=$MIN_MACOS -D_LIBCPP_DISABLE_AVAILABILITY" >> "$GITHUB_ENV"
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            echo "CMAKE_OSX_ARCHITECTURES=arm64" >> "$GITHUB_ENV"
            echo "ARCHFLAGS=-arch arm64" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=clang" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_AARCH64_APPLE_DARWIN_RUSTFLAGS=-C link-arg=-mmacosx-version-min=$MIN_MACOS" >> "$GITHUB_ENV"
            echo "CC_aarch64_apple_darwin=clang" >> "$GITHUB_ENV"
            echo "CXX_aarch64_apple_darwin=clang++" >> "$GITHUB_ENV"
            echo "AR_aarch64_apple_darwin=ar" >> "$GITHUB_ENV"
            echo "RANLIB_aarch64_apple_darwin=ranlib" >> "$GITHUB_ENV"
          else
            echo "CMAKE_OSX_ARCHITECTURES=x86_64" >> "$GITHUB_ENV"
            echo "ARCHFLAGS=-arch x86_64" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_X86_64_APPLE_DARWIN_RUSTFLAGS=-C link-arg=-mmacosx-version-min=$MIN_MACOS" >> "$GITHUB_ENV"
            echo "CC_x86_64_apple_darwin=clang" >> "$GITHUB_ENV"
            echo "CXX_x86_64_apple_darwin=clang++" >> "$GITHUB_ENV"
            echo "AR_x86_64_apple_darwin=ar" >> "$GITHUB_ENV"
            echo "RANLIB_x86_64_apple_darwin=ranlib" >> "$GITHUB_ENV"
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Print resolved kuzu crate version
        run: cargo tree -p kuzu --manifest-path src-tauri/Cargo.toml

      - name: Clean cached kuzu artifacts on macOS
        if: startsWith(matrix.os, 'macos-')
        run: cargo clean -p kuzu --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri bundles
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG: "true"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.os }}-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error
