name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: app,dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows bundling dependencies
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install wixtoolset nsis -y --no-progress
          "C:\Program Files (x86)\WiX Toolset v3.11\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install macOS system dependencies
        if: startsWith(matrix.os, 'macos-')
        run: |
          brew update
          brew install cmake ninja pkg-config libomp

      - name: Print macOS build diagnostics
        if: startsWith(matrix.os, 'macos-')
        run: |
          uname -a
          uname -m
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          rustc -Vv
          cargo -V

      - name: Configure macOS build environment
        if: startsWith(matrix.os, 'macos-')
        run: |
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_JOBS=2" >> "$GITHUB_ENV"
          echo "NUM_JOBS=2" >> "$GITHUB_ENV"
          echo "CMAKE_BUILD_PARALLEL_LEVEL=2" >> "$GITHUB_ENV"
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            echo "CMAKE_OSX_ARCHITECTURES=arm64" >> "$GITHUB_ENV"
            echo "ARCHFLAGS=-arch arm64" >> "$GITHUB_ENV"
            echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
            echo "CFLAGS=-mmacosx-version-min=11.0" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-mmacosx-version-min=11.0" >> "$GITHUB_ENV"
          else
            echo "CMAKE_OSX_ARCHITECTURES=x86_64" >> "$GITHUB_ENV"
            echo "ARCHFLAGS=-arch x86_64" >> "$GITHUB_ENV"
            echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"
            echo "CFLAGS=-mmacosx-version-min=11.0" >> "$GITHUB_ENV"
            echo "CXXFLAGS=-mmacosx-version-min=11.0" >> "$GITHUB_ENV"
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Print resolved kuzu crate version
        run: cargo tree -p kuzu --manifest-path src-tauri/Cargo.toml

      - name: Clean cached kuzu artifacts on macOS
        if: startsWith(matrix.os, 'macos-')
        run: cargo clean -p kuzu --manifest-path src-tauri/Cargo.toml

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
          CARGO_INCREMENTAL: "0"
          # Optional macOS signing/notarization secrets:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tessellum ${{ github.ref_name }}"
          releaseBody: "Automated cross-platform release for Tessellum."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

